<!-- AI CHATBOT -->
<div id="chatbot-widget">

  <!-- Floating Button -->
  <button id="chatToggleBtn" aria-label="Deschide chat">
    <img src="/images/chatbot.png" alt="asistent virtual" height="35" width="35">
  </button>

  <!-- Popup -->
  <div id="chatbotBox" class="hidden">

    <div class="chat-header">
      <span>Beauty Assistant</span>
      <button id="closeChat">×</button>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="bot-message">
        Bună! Sunt asistentul virtual Luxe Beauty <img src="/images/heartAI.png" alt="emoji" height="25" width="25"> Cu ce te pot ajuta?
      </div>
    </div>

    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Scrie aici..." maxlength="300">
      <button id="sendChat">Trimite</button>
    </div>

  </div>
</div>
